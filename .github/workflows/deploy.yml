name: Deploy to Firebase

on:
  workflow_dispatch:
    inputs:
      target:
        description: Distribution target
        required: true
        type: choice
        options:
          - tester-developer
          - user-beta
      release_notes:
        description: Release note (optional)
        required: false
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-flutter

      - name: Decode google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_B64 }}' | base64 -d > android/app/google-services.json

      - name: Decode .env
        run: echo '${{ secrets.ENV_FILE_B64 }}' | base64 -d > .env

      - name: Restore keystore & key.properties
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Set build version
        id: version
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "BUILD_NAME=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build APK Release
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.BUILD_NAME }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Verify APK
        run: test -f build/app/outputs/flutter-apk/app-release.apk || { echo "APK not found!"; exit 1; }

      - name: Firebase App Distribution
        run: |
          ARGS=()
          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            ARGS+=(--release-notes "${{ github.event.inputs.release_notes }}")
          fi
          npx firebase-tools appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "${{ github.event.inputs.target }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            "${ARGS[@]}"
